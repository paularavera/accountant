<!DOCTYPE html>
<html>

<head>
    <title>Accountant</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="body-violeta">
    <header class="header-blanco">
 
        <div class="account-balance space-y">
            <img src="./imagenes/logo.svg" alt="Logo" class="logo">
            <img src="./imagenes/moneda.png" alt="Moneda" class="space-y">
        </div>
    </header>
    <div>
        <img class="arco-violeta" src="imagenes/arco violeta.svg" alt="">
    </div>
    <main class="container">
        <h2 class="title">Iniciar Sesion</h2>
        <form class="form-login" action="">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password">

            <button type="submit" class="boton-login">
                <a href="index.html" class="boton-login">Iniciar sesión</a>
            </button>
        </form>
    </main>
    <div class="iconos-body">
        <nav>
            <a href="formulario.html"><img src="imagenes/boton-formulario.png" alt=""></a>
        </nav>
    </div>
    <footer class="footer">
        <p>Copyright (©) 2026 Accountant. All rights reserved.</p>
    </footer>
</body>

</html>
