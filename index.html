<!DOCTYPE html>
<html>

<head>
    <title>Accountant</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>

<body class="body">
    <header class="header">
        <div class="iconos-header">
            <div><img src="imagenes/user.png" alt=""></div>
            <div><img src="imagenes/home.png" alt=""></div>
            <div><img src="imagenes/bookmark.png" alt=""></div>
        </div>
        <div class="account-balance">
            <div>
                <img class="image" src="imagenes/moneda.png" alt="">
            </div>
            <p class="balance">Balance</p>
            <p class="total">$45,000.00</p>
        </div>
        <div class="movements">
            <p>Gastos</p>
            <p>Ingresos</p>
        </div>
        <div class="arco">
            <img class="arco" src="imagenes/arco acc.svg" alt="">
        </div>
    </header>
    <div class="flex">
        <div>
            <p>Total</p>
            <P>$0.00</P>
            <div><img src="imagenes/chart-gastos.png" alt=""></div>
        </div>
        <div>
            <div class="flex">
                <p>Diario</p>
                <p>Semanal</p>
                <p>Mensual</p>
                <p>Anual</p>
            </div>
            <div class="category-list">
                <p class="item"><span class="category-circle"></span>Ropa</p>
                <p class="item"><span class="category-circle"></span>Alimentos</p>
                <p class="item"><span class="category-circle"></span>Transporte</p>
                <p class="item"><span class="category-circle"></span>Servicios</p>
                <p class="item"><span class="category-circle"></span>Ocio</p>
            </div>
            <div>
            </div>
        </div>

    </div>
    <div class="iconos-body">
        <div><img src="imagenes/boton-formulario.png" alt=""></div>
    </div>
    <form action="">
        <div>
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" required />
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
        </div>
        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required />
        </div>
        <div>
            <button type="submit">Enviar</button>
        </div>
    </form>
</body>

</html>
