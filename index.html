<!DOCTYPE html>
<html>

<head>
    <title>Accountant</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="body">
    <header class="header">
        <nav class="iconos-header">
            <a href="./perfil.html"><img src="imagenes/user.png" alt=""></a>
            <a href="./index.html"><img src="imagenes/home.png" alt=""></a>
            <a href="./categories.html"><img src="imagenes/bookmark.png" alt=""></a>
        </nav>
        <div class="account-balance">
            <div>
                <img class="image" src="imagenes/moneda.png" alt="">
            </div>
            <p class="balance">Balance</p>
            <p class="total">$45,000.<span class="digite">00</span></p>
        </div>
        <div class="movements">
            <p>Gastos</p>
            <p class="no-select">Ingresos</p>
        </div>
    </header>
    <div>
        <img class="arco" src="imagenes/Curva.svg" alt="">
    </div>
    <main class="chart-container">
        <div>
            <p class="total-text small-text">Total</p>
            <P class="total-text">$57,400.00</P>
            <img class="chart-img" src="imagenes/chart-gastos.png" alt="chart">
        </div>
        <div>
            <div class="flex">
                <p class="no-select">Diario</p>
                <p class="select">Semanal</p>
                <p class="no-select">Mensual</p>
                <p class="no-select">Anual</p>
            </div>
            <div class="category-list">
                <div class="category-item">
                    <p class="item"><span class="category-circle" style="--color: #ef4444"></span>Ropa</p>
                    <p>$20,000.00</p>
                </div>
                <div class="category-item">
                    <p class="item"><span class="category-circle" style="--color: #FACC15"></span>Alimentos</p>
                    <p>$20,000.00</p>
                </div>
                <div class="category-item">
                    <p class="item"><span class="category-circle" style="--color: #6366F1"></span>Transporte</p>
                    <p>$20,000.00</p>
                </div class="category-item">
                <div class="category-item">
                    <p class="item"><span class="category-circle" style="--color: #3B82F6"></span>Servicios</p>
                    <p>$20,000.00</p>
                </div>
                <div class="category-item">
                    <p class="item"><span class="category-circle" style="--color: #352085"></span>Ocio</p>
                    <p>$20,000.00</p>
                </div>
            </div>
        </div>
    </main>
    <div class="iconos-body">
        <nav>
            <a href="formulario.html"><img src="imagenes/boton-formulario.png" alt=""></a>
        </nav>
    </div>
    <footer class="footer">
        <p>Copyright (©) 2026 Accountant. All rights reserved.</p>
    </footer>
</body>

</html>
