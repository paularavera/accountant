<!doctype html>
<html>
  <head>
    <title>Accountant</title>
    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="body">
    <header class="header">
      <nav class="iconos-header">
        <a href="./perfil.html"><img src="imagenes/user.png" alt="" /></a>
        <a href="home.html"><img src="imagenes/home.png" alt="" /></a>
        <a href="./categories.html"
          ><img src="imagenes/bookmark.png" alt=""
        /></a>
      </nav>
      <div class="account-balance">
        <div>
          <img class="image" src="imagenes/moneda.png" alt="" />
        </div>
        <p class="balance">Balance</p>
        <p class="total">$45,000.<span class="digite">00</span></p>
      </div>
    </header>
    <div>
      <img class="arco" src="imagenes/Curva.svg" alt="" />
    </div>
    <div>
      <p class="category-title">Ingresar movimiento</p>
    </div>
    <div>
      <form class="form" method="POST" netlify>
        <label for="categoria"
          >Categoría:
          <select name="categoria" id="categorias" required>
            <option value="">Seleccionar</option>
            <option value="almacen">Almacén</option>
            <option value="casa">Casa</option>
            <option value="compras">Compras</option>
            <option value="delivery">Delivery</option>
            <option value="educacion">Educación</option>
            <option value="expensas">Expensas</option>
            <option value="mascotas">Mascotas</option>
            <option value="ocio">Ocio</option>
            <option value="telefono">Teléfono</option>
            <option value="transporte">Transporte</option>
            <option value="viajes">Viajes</option>
          </select>
        </label>
        <label for="tipo"
          >Tipo:
          <select name="categoria" id="categorias" required>
            <option value="">Seleccionar</option>
            <option value="gasto">Gasto</option>
            <option value="ingreso">Ingreso</option>
          </select>
        </label>
        <label for="monto"
          >Monto:
          <input type="number" id="number" name="number" required />
        </label>
        <button type="submit">
          <img src="imagenes/check.png" alt="Check Icon" />
          Listo
          <a href="index.html"></a>
        </button>
      </form>
    </div>
  </body>
</html>
